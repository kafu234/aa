# ============================================================
# SEED 数据集 - DE 特征模式
# ============================================================
# DE 特征维度: 62通道 × 5频段 = 310
# 建议 window = 8~32 (每个时间步约 1 秒)
# 如果只用 beta+gamma 频段: feature_size = 62 × 2 = 124
# ============================================================

model:
  target: Models.interpretable_diffusion.FMTS.FM_TS
  params:
    seq_length: 16          # 时间窗口 (DE 段数)
    feature_size: 310       # 62通道 × 5频段; 只用2频段改为124
    n_layer_enc: 4
    n_layer_dec: 4
    d_model: 128            # 必须是 n_heads 的整数倍
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.1           # 小数据集建议加一点 dropout
    kernel_size: 3
    padding_size: 1

solver:
  base_lr: 3.0e-4
  max_epochs: 5000          # SEED 数据量小，不需要太多 epoch
  gradient_accumulate_every: 2
  save_cycle: 500           # 每 500 epoch 保存一次
  ema:
    decay: 0.995
    update_interval: 10

dataloader:
  train_dataset:
    target: Utils.Data_utils.seed_dataset.SEEDDataset
    params:
      name: SEED_DE
      data_root: ./Data/datasets/SEED/ExtractedFeatures
      data_type: de
      de_key_prefix: de_LDS
      # freq_bands: [3, 4]   # 取消注释则只用 beta+gamma
      window: 16
      stride: 8               # 50% 重叠，增加样本量
      proportion: 0.8
      neg_one_to_one: True
      scaler_type: minmax
      seed: 42
      period: train
      conditional: True        # 返回情绪标签

  test_dataset:
    target: Utils.Data_utils.seed_dataset.SEEDDataset
    params:
      name: SEED_DE
      data_root: ./Data/datasets/SEED/ExtractedFeatures
      data_type: de
      de_key_prefix: de_LDS
      window: 16
      stride: 16
      proportion: 0.8
      neg_one_to_one: True
      scaler_type: minmax
      seed: 42
      period: test
      conditional: True
    coefficient: 1.0e-2
    step_size: 5.0e-2
    sampling_steps: 100

  batch_size: 64
  sample_size: 256
  shuffle: True