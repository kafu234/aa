# ============================================================
# SEED DE 特征空间生成 — 正式训练配置
# ============================================================

model:
  target: Models.interpretable_diffusion.FMTS.FM_TS
  params:
    seq_length: 62
    feature_size: 5
    n_layer_enc: 6            # 4→6 加深编码器
    n_layer_dec: 6            # 4→6 加深解码器
    d_model: 256              # 128→256 增大模型容量
    n_heads: 8                # 4→8
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.05            # 0.1→0.05 数据量够时减小dropout
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-4            # 3e-4→1e-4 大模型用更小学习率
  max_epochs: 10000           # 5000→10000 充分训练
  gradient_accumulate_every: 2
  save_cycle: 1000
  ema:
    decay: 0.9995             # 0.995→0.9995 更平滑的EMA
    update_interval: 10

graph_topk: 6
graph_dropedge: 0.1
graph_bias_layers: 2
graph_gate_init: -4.0
target_graph_weight: 0.3

dataloader:
  train_dataset:
    target: Utils.Data_utils.seed_dataset.SEEDDataset
    params:
      name: SEED_DE_GEN
      data_root: /root/autodl-tmp/ExtractedFeatures
      de_key_prefix: de_LDS
      window: 1
      proportion: 0.8
      seed: 42
      period: train
      conditional: True

  batch_size: 512             # 256→512 DE维度低可以用大batch
  shuffle: True
