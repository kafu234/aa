# ============================================================
# SEED-IV DE 特征空间生成 — 正式训练配置
# ============================================================
# SEED-IV vs SEED:
#   - 4 类情绪: neutral(0), sad(1), fear(2), happy(3)
#   - 24 trials/session (SEED 是 15)
#   - 标签按 session 不同 (SEED 所有 session 共享)
#   - 目录: eeg_feature_smooth/1/, /2/, /3/
#   - 每被试约 2500 样本 (851+832+822), 比 SEED 略多
# ============================================================

model:
  target: Models.interpretable_diffusion.FMTS.FM_TS
  params:
    seq_length: 62
    feature_size: 5
    n_layer_enc: 6            # 4→6 加深编码器
    n_layer_dec: 6            # 4→6 加深解码器
    d_model: 256              # 128→256 增大模型容量
    n_heads: 8                # 4→8
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.05            # 0.1→0.05 SEED-IV 数据量够时减小dropout
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-4            # 3e-4→1e-4 大模型用更小学习率
  max_epochs: 10000           # 5000→10000 4类比3类更难, 充分训练
  gradient_accumulate_every: 2
  save_cycle: 1000
  ema:
    decay: 0.9995             # 0.995→0.9995 更平滑的EMA
    update_interval: 10

dataloader:
  train_dataset:
    target: Utils.Data_utils.seed4_dataset.SEEDIVDataset
    params:
      name: SEEDIV_DE_GEN
      data_root: /root/autodl-tmp/eeg_feature_smooth    # ← 改成你的路径
      data_type: de
      de_key_prefix: de_LDS
      proportion: 0.8
      seed: 42
      period: train
      conditional: True
      split_mode: session
      train_sessions: [1, 2]       # session 1&2 训练
      test_sessions: [3]           # session 3 测试

  batch_size: 512             # 256→512 DE维度低可以用大batch
  shuffle: True
