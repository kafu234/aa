# ============================================================
# SEED DE 特征空间生成 — EMA 每步更新 + 500 步 warm-up
# ============================================================

model:
  target: Models.interpretable_diffusion.FMTS.FM_TS
  params:
    seq_length: 62
    feature_size: 5
    n_layer_enc: 6
    n_layer_dec: 6
    d_model: 256
    n_heads: 8
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.05
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-4
  max_epochs: 10000
  gradient_accumulate_every: 2
  save_cycle: 1000
  ema:
    decay: 0.9995
    update_interval: 1
    warmup_steps: 500

dataloader:
  train_dataset:
    target: Utils.Data_utils.seed_dataset.SEEDDataset
    params:
      name: SEED_DE_GEN
      data_root: /root/autodl-tmp/ExtractedFeatures
      data_type: de
      de_key_prefix: de_LDS
      window: 1
      proportion: 0.8
      seed: 42
      period: train
      conditional: True

  batch_size: 512
  shuffle: True
